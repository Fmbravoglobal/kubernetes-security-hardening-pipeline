name: Kubernetes Security Hardening Pipeline

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform-security:
    name: Terraform Validate & Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform
        continue-on-error: true

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          quiet: true
          soft_fail: true
          skip_check: CKV_AWS_117,CKV_AWS_272,CKV_AWS_116,CKV_AWS_115,CKV_AWS_50,CKV2_AWS_64,CKV_AWS_58,CKV_AWS_37,CKV_AWS_38,CKV_AWS_39,CKV_AWS_65,CKV_AWS_74,CKV_AWS_149,CKV_ECR_1,CKV_ECR_2,CKV_ECR_3,CKV_AWS_382

  python-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic httpx pytest pytest-cov

      - name: Run pytest
        run: pytest tests/ -v --tb=short --ignore=tests/test_api.py
        continue-on-error: false
